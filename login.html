<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SimtechON Job Portal</title>
    <meta name="description"
        content="Login to your SimtechON Job Portal account. Manage your job applications or find IT talent for your next project." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/login.css">
    <script src="scripts/component-loader.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main style="padding-top: 100px;">
        <!-- ─── LOGIN SECTION ─── -->
        <section id="login">
            <div class="container">
                <div class="section-header fade-up">
                    <h2 class="section-title">Welcome <span class="text-blue">Back</span></h2>
                    <p class="section-sub">Log in to manage your portal account and stay connected.</p>
                </div>

                <div class="login-container fade-up">
                    <form>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" required>
                        </div>
                        
                        <div class="login-options">
                            <label class="remember-me">
                                <input type="checkbox">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn-portal-login">Log In <span>→</span></button>

                        <div class="login-footer">
                            <p>Don't have an account? <a href="registration.html">Create one now</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // ─── Scroll-based fade-in ───
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    </script>
</body>

</html>
