<!-- ─── HEADER / NAVBAR ─── -->

<style>
    /* ─── FONT IMPORTS ─── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200');

    /* ─── CSS VARIABLES (shared tokens) ─── */
    :root {
        --blue-50: #eff6ff;
        --blue-100: #dbeafe;
        --blue-200: #bfdbfe;
        --blue-400: #2563eb;
        --blue-500: #1d4ed8;
        --blue-600: #1e40af;
        --blue-700: #1e3a8a;
        --blue-900: #172554;
        --orange-500: #f97316;
        --orange-600: #ea580c;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-700: #334155;
        --gray-900: #0f172a;
        --text-muted: #64748b;
        --card-border: #e2e8f0;
    }

    /* ─── MATERIAL ICONS ─── */
    .material-symbols-rounded {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
    }

    /* ─── NAVBAR ─── */
    nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 1);
        border-bottom: 1px solid var(--card-border);
    }

    .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 68px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem;
    }

    .nav-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
    }

    .nav-logo-text {
        font-family: 'Manrope', sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--gray-900);
        letter-spacing: -0.02em;
    }

    .nav-logo-text span {
        color: var(--blue-400);
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 2rem;
        list-style: none;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
        position: relative;
    }

    .nav-links a:hover {
        color: var(--gray-900);
    }

    .nav-links a.active {
        color: var(--gray-900);
        font-weight: 600;
    }

    .nav-links a.active::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--blue-400);
        border-radius: 2px;
    }

    .nav-auth {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .nav-login {
        text-decoration: none;
        color: var(--gray-900);
        font-size: 0.875rem;
        font-weight: 600;
        transition: color 0.2s;
    }

    .nav-login:hover {
        color: var(--blue-400);
    }

    .nav-signup {
        background: var(--blue-400);
        color: #fff;
        border: none;
        padding: 0.55rem 1.4rem;
        border-radius: 50px;
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        text-decoration: none;
    }

    .nav-signup:hover {
        background: var(--blue-500);
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
    }

    .mobile-only {
        display: none;
    }

    .nav-hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--gray-700);
        cursor: pointer;
        font-size: 1.5rem;
    }

    /* ─── MOBILE RESPONSIVE ─── */
    @media (max-width: 768px) {
        .nav-inner {
            padding: 0 1rem;
        }

        .nav-links {
            position: absolute;
            top: 68px;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            flex-direction: column;
            gap: 0;
            border-bottom: 1px solid var(--card-border);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            z-index: 1000;
        }

        .nav-links.nav-active {
            max-height: 500px;
        }

        .nav-links li {
            width: 100%;
        }

        .nav-links a {
            display: block;
            padding: 1.25rem 1.5rem;
            font-size: 1rem;
            border-bottom: 1px solid var(--gray-50);
            color: var(--gray-900);
        }

        .nav-links a.active::after {
            display: none;
        }

        .mobile-only {
            display: block;
        }

        .nav-auth {
            display: none;
        }

        .nav-hamburger {
            display: flex;
        }
    }
</style>

<nav id="navbar">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">
            <span class="nav-logo-text">Simtech<span>ON</span></span>
        </a>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="jobs.html">Job Portal</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li class="mobile-only"><a href="login.html">Login</a></li>
            <li class="mobile-only"><a href="registration.html">Sign Up</a></li>
        </ul>

        <div class="nav-auth">
            <a href="login.html" class="nav-login">Login</a>
            <a href="registration.html" class="nav-signup">Sign Up</a>
        </div>
        <button class="nav-hamburger" aria-label="Menu">
            <span class="material-symbols-rounded">menu</span>
        </button>
    </div>
</nav>

<script>
    // ─── Mobile Navbar Toggle ───
    const hamburger = document.querySelector('.nav-hamburger');
    const navLinks = document.querySelector('.nav-links');
    const hamburgerIcon = hamburger.querySelector('.material-symbols-rounded');

    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('nav-active');
        hamburgerIcon.textContent = navLinks.classList.contains('nav-active') ? 'close' : 'menu';
    });

    // Close menu when a link is clicked
    navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            navLinks.classList.remove('nav-active');
            hamburgerIcon.textContent = 'menu';
        });
    });

    // ─── Navbar shadow on scroll ───
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 20) {
            navbar.style.background = 'rgba(255,255,255,0.97)';
            navbar.style.boxShadow = '0 2px 24px rgba(15,23,42,0.1)';
        } else {
            navbar.style.background = 'rgba(255,255,255,1)';
            navbar.style.boxShadow = '0 1px 20px rgba(15,23,42,0.06)';
        }
    });

    // ─── Highlight active page link ───
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    navLinks.querySelectorAll('a').forEach(link => {
        const linkPage = link.getAttribute('href').split('/').pop();
        if (linkPage === currentPage) {
            link.classList.add('active');
        }
    });
</script>
